<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In | Lumina Platform</title>
  <meta name="description" content="Log in to your Lumina account.">
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      background: var(--surface-light);
    }
    .auth-container {
      min-height: calc(100vh - 160px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4rem 1rem;
    }
    .auth-card {
      background: var(--surface);
      padding: 3rem;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      width: 100%;
      max-width: 480px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }
    .auth-card h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    .auth-card p {
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 2.5rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
      color: var(--text-muted);
    }
    .form-input {
      width: 100%;
      padding: 0.875rem 1rem;
      background: var(--surface-light);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      color: var(--text);
      font-family: inherit;
      transition: all var(--transition);
    }
    .form-input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <header style="background: transparent;">
    <div class="container nav">
      <a href="index.html" class="logo">Lumina.</a>
      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a href="courses.html">Courses</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
      <div>
        <a href="signup.html" class="btn btn-primary">Sign Up</a>
      </div>
    </div>
  </header>

  <main class="auth-container animate-fade-in">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p>Enter your details to log in to your account.</p>
      
      <form>
        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input type="email" id="email" class="form-input" placeholder="Enter your email" required>
        </div>
        <div class="form-group">
          <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
            <label class="form-label" for="password" style="margin-bottom: 0;">Password</label>
            <a href="#" style="font-size: 0.875rem; color: var(--primary);">Forgot Password?</a>
          </div>
          <input type="password" id="password" class="form-input" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem;">Log In</button>
      </form>
      
      <div style="text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.875rem;">
        Don't have an account? <a href="signup.html" style="color: var(--primary); font-weight: 500;">Sign Up</a>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
